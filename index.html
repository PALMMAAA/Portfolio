<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Моё портфолио</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      text-decoration: none;
      background: black;
      color: white;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 12px;
      font-size: 18px;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Моё портфолио</h1>
    <p>Выберите проект для просмотра</p>

    <a class="btn" href="roses.html">Сайт 1 — Roses in SPB</a>
    <a class="btn" href="fitforce.html">Сайт 2 — Fit Force</a>
  </div>
</body>
</html>
